<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Faça um orçamento</title>
  <link rel="stylesheet" href="assets/css/styles.css">
  <link rel="stylesheet" href="assets/css/budget.css">
</head>
<body>
  <main class="container-budgetForm">
    <h2 class="budget-title">Faça um Orçamento</h2>
    <section class="budget-informations">
      <div class="informations">
        <h2 class="informations-titles">Tipo de site</h2>
        <div class="informations-box">
        </div>
      </div>
      <div class="informations">
        <h2 class="informations-titles">Tipo de página(s)</h2>
        <div class="informations-box">
        </div>
      </div>
      <div class="informations">
        <h2 class="informations-titles">Precisa de logótipo</h2>
        <div class="informations-box">
        </div>
      </div>
      <div class="informations">
        <h2 class="informations-titles">Prazo</h2>
        <div class="informations-box">
        </div>
      </div>
      <div class="finalPrice">

      </div>
    </section>
    <form class="budgetForm" action="" method="post">
      <article class="websiteType">
        <div class="websites">
          <img src="assets/images/website-logo.svg" alt="">
          <h3>Websites</h3>
        </div>
        <div class="onlineStores">
          <img src="assets/images/onlineStore-logo.svg" alt="">
          <h3>Lojas Online</h3>
        </div>
      </article>
      <div class="containers-form">
        <h2 class="form-titles">Páginas do Website</h2>
        <div class="selectNumberOfPages">
          <label for="singlePage">Página Única</label>
          <input type="checkbox" name="singlePage" id="singlePage">
          <label for="multiplePages">Múltiplas Páginas</label>
          <input type="checkbox" name="multiplePages" id="multiplePages">
        </div>
      </div>
      <div class="containers-form">
        <h2 class="form-titles">Design</h2>
        <label class="pageOptions-title" for="pageOptions">Opções de Página(s)</label>
        <select class="pageOptions" name="" id="pageOptions">
          <option value="">Preciso de uma proposta visual</option>
          <option value="">Já tenho uma maquete para aplicar</option>
          <option value="">Preciso de logótipo</option>
        </select>
      </div>
      <div class="containers-form">
        <h2 class="form-titles">Prazo</h2>
        <label class="pageOptions-title" for="setTheDeadline">Preciso de um site em:</label>
        <select class="pageOptions" name="" id="setTheDeadline">
          <option value="">2 semanas</option>
          <option value="">3 semanas</option>
          <option value="">4 semanas</option>
          <option value="">Não tenho urgência</option>
        </select>
      </div>
      <div class="containers-form">
        <label class="form-titles" for="mensage">Deixe uma mensagem</label>
        <textarea id="mensage"></textarea>
      </div>
      <div class="container-btn">
        <input class="form-btn" type="submit" value="Enviar">
        <input class="form-btn" type="reset" value="Resetar">
      </div>
    </form>
  </main>
</body>
</html>
